<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="退職リスク診断">
  <meta name="theme-color" content="#6366f1">
  <meta name="description" content="学術研究に基づく退職リスク診断ツール。10の科学的指標で退職リスクを可視化します。">
  <title>退職リスク診断 - Retirement Risk Assessment</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Start Screen -->
  <section id="screen-start" class="screen active">
    <div class="start-container">
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#818cf8"/>
                <stop offset="100%" stop-color="#6366f1"/>
              </linearGradient>
            </defs>
            <circle cx="40" cy="40" r="36" fill="url(#logoGrad)" opacity="0.15"/>
            <circle cx="40" cy="40" r="24" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
            <path d="M40 20 L40 40 L55 50" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="40" cy="40" r="3" fill="#818cf8"/>
          </svg>
        </div>
        <h1 class="app-title">退職リスク診断</h1>
        <p class="app-subtitle">Retirement Risk Assessment</p>
      </div>

      <div class="glass-card intro-card">
        <p class="intro-text">
          世界中の学術研究に基づく<strong>10の科学的指標</strong>で、あなたの退職リスクを多角的に診断します。
        </p>
        <ul class="feature-list">
          <li>
            <span class="feature-icon">&#x1F4CA;</span>
            <span>10次元のリスク分析</span>
          </li>
          <li>
            <span class="feature-icon">&#x1F4D6;</span>
            <span>査読付き論文に基づく設計</span>
          </li>
          <li>
            <span class="feature-icon">&#x23F1;</span>
            <span>全30問・約5分で完了</span>
          </li>
        </ul>
      </div>

      <button id="btn-start" class="btn-primary" type="button">
        診断を始める
        <svg class="btn-arrow" viewBox="0 0 24 24" width="20" height="20">
          <path d="M5 12h14M12 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <p class="privacy-note">回答データは端末内のみに保存され、外部送信されません。</p>
    </div>
  </section>

  <!-- Question Screen -->
  <section id="screen-question" class="screen">
    <div class="question-container">
      <div class="progress-area">
        <div class="progress-info">
          <span id="progress-category" class="progress-category"></span>
          <span id="progress-count" class="progress-count"></span>
        </div>
        <div class="progress-bar-track">
          <div id="progress-bar" class="progress-bar-fill"></div>
        </div>
      </div>

      <div id="question-card" class="glass-card question-card">
        <div class="question-number" id="question-number"></div>
        <p class="question-text" id="question-text"></p>
        <div class="likert-scale" id="likert-scale">
          <button class="likert-btn" data-value="1" type="button">
            <span class="likert-value">1</span>
            <span class="likert-label">全くそう<br>思わない</span>
          </button>
          <button class="likert-btn" data-value="2" type="button">
            <span class="likert-value">2</span>
            <span class="likert-label">あまりそう<br>思わない</span>
          </button>
          <button class="likert-btn" data-value="3" type="button">
            <span class="likert-value">3</span>
            <span class="likert-label">どちらとも<br>いえない</span>
          </button>
          <button class="likert-btn" data-value="4" type="button">
            <span class="likert-value">4</span>
            <span class="likert-label">ややそう<br>思う</span>
          </button>
          <button class="likert-btn" data-value="5" type="button">
            <span class="likert-value">5</span>
            <span class="likert-label">非常にそう<br>思う</span>
          </button>
        </div>
      </div>

      <button id="btn-back" class="btn-secondary btn-nav" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        前の質問
      </button>
    </div>
  </section>

  <!-- Result Screen -->
  <section id="screen-result" class="screen">
    <div class="result-container">
      <h2 class="result-title">診断結果</h2>

      <!-- Overall Score -->
      <div class="glass-card score-card">
        <div class="gauge-container" id="gauge-container">
          <svg id="gauge-svg" viewBox="0 0 200 200" width="200" height="200"></svg>
          <div class="gauge-label">
            <span class="gauge-score" id="gauge-score">0</span>
            <span class="gauge-max">/ 100</span>
          </div>
        </div>
        <div id="risk-level" class="risk-level"></div>
        <p id="risk-description" class="risk-description"></p>
      </div>

      <!-- Radar Chart -->
      <div class="glass-card chart-card">
        <h3 class="card-title">次元別スコア</h3>
        <div class="radar-container" id="radar-container">
          <svg id="radar-svg" viewBox="0 0 350 350"></svg>
        </div>
      </div>

      <!-- Dimension Details -->
      <div class="glass-card details-card">
        <h3 class="card-title">各次元の詳細</h3>
        <div id="dimension-details" class="dimension-details"></div>
      </div>

      <!-- Advice -->
      <div class="glass-card advice-card" id="advice-card">
        <h3 class="card-title">改善のためのアドバイス</h3>
        <div id="advice-content" class="advice-content"></div>
      </div>

      <!-- References -->
      <div class="glass-card references-card">
        <h3 class="card-title">学術リファレンス</h3>
        <div id="references-content" class="references-content"></div>
      </div>

      <!-- Actions -->
      <div class="result-actions">
        <button id="btn-share" class="btn-primary btn-share" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          結果を共有
        </button>
        <button id="btn-retry" class="btn-secondary" type="button">もう一度診断する</button>
      </div>
    </div>
  </section>

  <script src="js/questions.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
